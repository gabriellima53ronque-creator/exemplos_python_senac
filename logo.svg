<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0057D9"/>
      <stop offset="100%" stop-color="#39D98A"/>
    </linearGradient>

    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E88FF"/>
      <stop offset="100%" stop-color="#58CC02"/>
    </linearGradient>
  </defs>

  <!-- Fundo do ícone -->
  <rect x="90" y="60" width="330" height="280" rx="35"
        fill="none"
        stroke="url(#grad1)"
        stroke-width="10"/>

  <!-- Grade -->
  <g stroke="#BFEAD7" stroke-width="2">
    <line x1="220" y1="80" x2="220" y2="320"/>
    <line x1="250" y1="80" x2="250" y2="320"/>
    <line x1="280" y1="80" x2="280" y2="320"/>
    <line x1="310" y1="80" x2="310" y2="320"/>
    <line x1="340" y1="80" x2="340" y2="320"/>

    <line x1="200" y1="110" x2="390" y2="110"/>
    <line x1="200" y1="140" x2="390" y2="140"/>
    <line x1="200" y1="170" x2="390" y2="170"/>
    <line x1="200" y1="200" x2="390" y2="200"/>
  </g>

  <!-- Relógio -->
  <circle cx="150" cy="120" r="25"
          fill="none"
          stroke="#0057D9"
          stroke-width="5"/>

  <line x1="150" y1="120" x2="150" y2="105"
        stroke="#0057D9"
        stroke-width="4"/>

  <line x1="150" y1="120" x2="162" y2="120"
        stroke="#0057D9"
        stroke-width="4"/>

  <!-- Quadro -->
  <rect x="180" y="150" width="120" height="70"
        rx="4"
        fill="white"
        stroke="#0077CC"
        stroke-width="6"/>

  <rect x="230" y="220" width="20" height="20"
        fill="#0077CC"/>

  <rect x="210" y="240" width="60" height="8"
        rx="4"
        fill="#0077CC"/>

  <!-- Mesas -->
  <g fill="#0057D9">
    <rect x="165" y="260" width="45" height="20" rx="4"/>
    <rect x="245" y="260" width="45" height="20" rx="4"/>
  </g>

  <!-- Cadeiras -->
  <g fill="#0077CC">
    <rect x="170" y="285" width="15" height="20"/>
    <rect x="195" y="285" width="15" height="20"/>

    <rect x="250" y="285" width="15" height="20"/>
    <rect x="275" y="285" width="15" height="20"/>
  </g>

  <!-- Pin -->
  <path d="M360 190
           C325 190 305 215 305 245
           C305 290 360 340 360 340
           C360 340 415 290 415 245
           C415 215 395 190 360 190Z"
        fill="url(#grad2)"
        stroke="#008A55"
        stroke-width="4"/>

  <!-- Check -->
  <circle cx="360" cy="240" r="38"
          fill="#58CC02"/>

  <path d="M345 240
           L357 252
           L380 225"
        fill="none"
        stroke="white"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Texto -->
  <text x="100" y="430"
        font-size="55"
        font-family="Arial"
        font-weight="bold"
        fill="#0057D9">
    organiza
  </text>

  <text x="335" y="430"
        font-size="55"
        font-family="Arial"
        font-weight="bold"
        fill="#58CC02">
    AI
  </text>

</svg>